<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin"> <title>Custom YouTube Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #cc0000;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            display: none; 
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Paste YouTube Link to Play</h2>
        
        <div class="input-group">
            <input type="text" id="youtubeUrl" placeholder="Paste link here (e.g., https://youtu.be/... or /shorts/...)">
            <button onclick="playVideo()">Play Video</button>
        </div>

        <div class="video-wrapper" id="videoContainer"></div>
    </div>

    <script>
        function playVideo() {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const videoContainer = document.getElementById('videoContainer');
            const videoId = extractVideoID(urlInput);

            if (videoId) {
                // FIX 2: Switched to youtube-nocookie.com which is less restrictive on headers
                const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
                
                // FIX 3: Added referrerpolicy="strict-origin-when-cross-origin" to the iframe
                videoContainer.innerHTML = `
                    <iframe 
                        src="${embedUrl}" 
                        frameborder="0" 
                        referrerpolicy="strict-origin-when-cross-origin"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>`;
                
                videoContainer.style.display = 'block';
            } else {
                alert("Invalid YouTube URL. Try again!");
            }
        }

        function extractVideoID(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/gi;
            const match = regExp.exec(url);
            return (match && match[1]) ? match[1] : null;
        }
    </script>

</body>
</html>
