<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Feedback Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ===== ADMIN PANEL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f1c;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ---- Header ---- */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .admin-header h1 {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header h1 span {
            color: #f39c12;
        }

        .admin-header h1 i {
            color: #f39c12;
            font-size: 32px;
        }

        .admin-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(243, 156, 18, 0.12);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(243, 156, 18, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .stat-badge i {
            color: #f39c12;
        }

        .stat-badge strong {
            font-size: 20px;
            color: #fff;
        }

        .refresh-btn {
            background: #f39c12;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(243, 156, 18, 0.3);
        }

        .refresh-btn:active {
            transform: scale(0.97);
        }

        .refresh-btn i {
            font-size: 16px;
        }

        /* ---- Filters ---- */
        .filter-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            align-items: center;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 180px;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            border-color: #f39c12;
            background: rgba(255, 255, 255, 0.06);
        }

        .filter-bar input::placeholder {
            color: #666;
        }

        .filter-bar select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        /* ---- Table ---- */
        .table-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: rgba(243, 156, 18, 0.08);
        }

        thead th {
            padding: 16px 18px;
            text-align: left;
            font-weight: 600;
            color: #f39c12;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: #0a0f1c;
            z-index: 5;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        tbody td {
            padding: 14px 18px;
            vertical-align: middle;
            word-break: break-word;
        }

        /* ---- Profile Photo in Table ---- */
        .td-photo img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f39c12;
        }

        .td-photo .default-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(243, 156, 18, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f39c12;
            font-size: 20px;
            border: 2px solid rgba(243, 156, 18, 0.2);
        }

        /* ---- Rating Stars in Table ---- */
        .td-rating i {
            color: #f39c12;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .td-rating .empty-star {
            color: #444;
        }

        /* ---- Delete Button ---- */
        .delete-btn {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .delete-btn:hover {
            background: #e74c3c;
            color: #fff;
            transform: scale(1.05);
        }

        /* ---- Loading State ---- */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading-state i {
            font-size: 48px;
            color: #f39c12;
            margin-bottom: 16px;
            display: block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state i {
            font-size: 60px;
            color: #333;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state h3 {
            color: #888;
            margin-bottom: 8px;
        }

        /* ---- Toast Notification ---- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 28px;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: #2ecc71;
        }

        .toast.error {
            background: #e74c3c;
        }

        .toast.info {
            background: #3498db;
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                align-items: stretch;
                padding: 18px 20px;
            }

            .admin-header h1 {
                font-size: 22px;
            }

            .admin-stats {
                flex-wrap: wrap;
            }

            .stat-badge {
                font-size: 12px;
                padding: 6px 14px;
            }

            .filter-bar {
                flex-direction: column;
            }

            .filter-bar input,
            .filter-bar select {
                width: 100%;
                min-width: unset;
            }

            thead th,
            tbody td {
                padding: 10px 12px;
                font-size: 12px;
            }

            .td-photo img {
                width: 35px;
                height: 35px;
            }

            .delete-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px 10px;
            }

            .admin-header h1 {
                font-size: 18px;
            }

            .stat-badge {
                font-size: 11px;
                padding: 4px 10px;
            }

            thead th,
            tbody td {
                padding: 8px 8px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <!-- Header -->
    <div class="admin-header">
        <h1>
            <i class="fas fa-chart-pie"></i>
            Feedback <span>Dashboard</span>
        </h1>
        <div class="admin-stats">
            <div class="stat-badge">
                <i class="fas fa-envelope"></i>
                Total: <strong id="totalCount">0</strong>
            </div>
            <button class="refresh-btn" onclick="loadFeedback()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, email, phone..." oninput="filterTable()">
        <select id="ratingFilter" onchange="filterTable()">
            <option value="">⭐ All Ratings</option>
            <option value="5">5 Stars ⭐</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Photo</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Subject</th>
                    <th>Feedback</th>
                    <th>Rating</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="feedbackTableBody">
                <tr>
                    <td colspan="10">
                        <div class="loading-state">
                            <i class="fas fa-spinner"></i>
                            Loading feedback data...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
    // ==========================================================
    // ADMIN PANEL - FEEDBACK DASHBOARD
    // ==========================================================

    // 👇 REPLACE WITH YOUR DEPLOYED WEB APP URL
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';

    let allFeedback = [];

    // ===== LOAD FEEDBACK FROM GOOGLE SHEETS =====
    async function loadFeedback() {
        const tbody = document.getElementById('feedbackTableBody');
        tbody.innerHTML = `
            <tr>
                <td colspan="10">
                    <div class="loading-state">
                        <i class="fas fa-spinner"></i>
                        Loading feedback data...
                    </div>
                </td>
            </tr>
        `;

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const result = await response.json();

            if (result.result === 'success') {
                allFeedback = result.data || [];
                document.getElementById('totalCount').textContent = allFeedback.length;
                renderTable(allFeedback);
            } else {
                throw new Error(result.message || 'Failed to load data');
            }
        } catch (error) {
            console.error('Error loading feedback:', error);
            tbody.innerHTML = `
                <tr>
                    <td colspan="10">
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Error Loading Data</h3>
                            <p>${error.message}</p>
                            <button class="refresh-btn" style="margin-top:16px;display:inline-flex;" onclick="loadFeedback()">
                                <i class="fas fa-sync-alt"></i> Try Again
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        }
    }

    // ===== RENDER TABLE =====
    function renderTable(data) {
        const tbody = document.getElementById('feedbackTableBody');

        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="10">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>No Feedback Yet</h3>
                            <p>Be the first one to receive feedback! 🎉</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        let html = '';
        data.forEach((item, index) => {
            const rating = parseInt(item.Rating) || 0;
            const stars = generateStars(rating);
            const photoHtml = item.ProfilePhoto 
                ? `<img src="${item.ProfilePhoto}" alt="${item.Name || 'User'}">`
                : `<div class="default-avatar"><i class="fas fa-user"></i></div>`;

            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td class="td-photo">${photoHtml}</td>
                    <td><strong>${item.Name || '—'}</strong></td>
                    <td><a href="mailto:${item.Email}" style="color:#f39c12;text-decoration:none;">${item.Email || '—'}</a></td>
                    <td>${item.Phone || '—'}</td>
                    <td><span style="background:rgba(243,156,18,0.1);padding:2px 10px;border-radius:20px;font-size:12px;">${item.Subject || '—'}</span></td>
                    <td style="max-width:200px;font-size:13px;color:#ccc;">${item.Message || '—'}</td>
                    <td class="td-rating">${stars}</td>
                    <td style="font-size:12px;color:#888;">${item.Timestamp || '—'}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteFeedback(${index + 2})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = html;
    }

    // ===== GENERATE STAR RATING HTML =====
    function generateStars(rating) {
        let html = '';
        for (let i = 1; i <= 5; i++) {
            if (i <= rating) {
                html += '<i class="fas fa-star"></i>';
            } else {
                html += '<i class="fas fa-star empty-star"></i>';
            }
        }
        return html;
    }

    // ===== FILTER TABLE =====
    function filterTable() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const ratingFilter = document.getElementById('ratingFilter').value;

        let filtered = allFeedback;

        // Search filter
        if (searchTerm) {
            filtered = filtered.filter(item => {
                return (item.Name && item.Name.toLowerCase().includes(searchTerm)) ||
                       (item.Email && item.Email.toLowerCase().includes(searchTerm)) ||
                       (item.Phone && item.Phone.includes(searchTerm)) ||
                       (item.Subject && item.Subject.toLowerCase().includes(searchTerm)) ||
                       (item.Message && item.Message.toLowerCase().includes(searchTerm));
            });
        }

        // Rating filter
        if (ratingFilter) {
            filtered = filtered.filter(item => {
                return parseInt(item.Rating) === parseInt(ratingFilter);
            });
        }

        document.getElementById('totalCount').textContent = filtered.length;
        renderTable(filtered);
    }

    // ===== DELETE FEEDBACK =====
    async function deleteFeedback(rowIndex) {
        if (!confirm('Are you sure you want to delete this feedback entry? This action cannot be undone.')) {
            return;
        }

        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?rowIndex=${rowIndex}`, {
                method: 'DELETE'
            });
            const result = await response.json();

            if (result.result === 'success') {
                showToast('✅ Feedback deleted successfully!', 'success');
                loadFeedback(); // Reload table
            } else {
                throw new Error(result.message || 'Delete failed');
            }
        } catch (error) {
            console.error('Delete error:', error);
            showToast('❌ Failed to delete: ' + error.message, 'error');
        }
    }

    // ===== TOAST NOTIFICATION =====
    function showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        // Force reflow
        void toast.offsetWidth;
        toast.classList.add('show');

        clearTimeout(toast._hideTimer);
        toast._hideTimer = setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    // ===== AUTO-REFRESH EVERY 60 SECONDS =====
    setInterval(() => {
        loadFeedback();
    }, 60000);

    // ===== LOAD ON PAGE LOAD =====
    document.addEventListener('DOMContentLoaded', loadFeedback);
</script>

</body>
</html>
