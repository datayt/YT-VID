<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>Ultimate YouTube Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 { margin-top: 0; color: #333; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #cc0000; }
        
        /* Video Container */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            display: none; 
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Bypass Link Styling */
        .fallback-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 6px;
            color: #856404;
        }
        .fallback-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #856404;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .fallback-btn:hover { background-color: #533f06; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Paste YouTube Link to Play</h2>
        
        <div class="input-group">
            <input type="text" id="youtubeUrl" placeholder="Paste regular or Shorts link here...">
            <button onclick="playVideo()">Play Video</button>
        </div>

        <div class="video-wrapper" id="videoContainer"></div>

        <div class="fallback-box" id="fallbackBox">
            <p><strong>Note:</strong> If the player above shows Error 153, your browser is blocking local files. Click below to play it in a clean, full-screen tab instead:</p>
            <a href="#" id="fallbackLink" target="_blank" class="fallback-btn">🚀 Open Video Player Tab</a>
        </div>
    </div>

    <script>
        function playVideo() {
            const urlInput = document.getElementById('youtubeUrl').value.trim();
            const videoContainer = document.getElementById('videoContainer');
            const fallbackBox = document.getElementById('fallbackBox');
            const fallbackLink = document.getElementById('fallbackLink');
            
            const videoId = extractVideoID(urlInput);

            if (videoId) {
                // Generate the clean embed link
                const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&origin=https://www.youtube.com`;
                
                // 1. Try loading it in the page anyway
                videoContainer.innerHTML = `
                    <iframe 
                        src="${embedUrl}" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>`;
                videoContainer.style.display = 'block';
                
                // 2. Automatically set up the 100% working fallback link below it
                fallbackLink.href = embedUrl;
                fallbackBox.style.display = 'block';
            } else {
                alert("Please paste a valid YouTube or Shorts link!");
            }
        }

        function extractVideoID(url) {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/gi;
            const match = regExp.exec(url);
            return (match && match[1]) ? match[1] : null;
        }
    </script>

</body>
</html>
